name: update-data

# SK하이닉스 본주/ADR/환율 시세를 주기적으로 수집하여 data.json 을 갱신·커밋한다.
# 스케줄은 UTC 기준. GitHub 스케줄 워크플로우는 5분이 최소 간격이며 부하 시 수 분~십수 분
# 지연되거나 건너뛸 수 있다(정확한 실시간이 아님). 저장소 60일 무활동 시 스케줄은 자동 비활성화된다.

on:
  workflow_dispatch:        # Actions 탭에서 수동 실행
  schedule:
    - cron: "*/5 0-6 * * 1-5"    # KOSPI 정규장 09:00~15:30 KST (00:00~06:30 UTC)
    - cron: "*/5 13-23 * * 1-5"  # 미국장 프리·정규·애프터 (대략, EDT/EST 포함)

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch quotes and compute disparity
        run: python scripts/fetch_data.py

      - name: Commit updated data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "data.json 변경 없음 — 커밋 생략"
          else
            git commit -m "data: update quotes $(date -u +'%Y-%m-%dT%H:%MZ')"
            git push
          fi
